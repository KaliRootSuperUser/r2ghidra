name: ci

env:
  R2V: 6.1.8

on:
  push:
    branches:
      - master
    tags:
      - '[0-9]*.*.*'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  r2git:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
    steps:
    - name: Checkout
      uses: actions/checkout@v7
    - name: Installing radare2 from git
      run: ( git clone --depth=1 https://github.com/radareorg/radare2 && cd radare2 && sys/install.sh /usr )
    - name: Building r2ghidra with acr
      run: ./preconfigure && ./configure --prefix=/usr && make -j4 ; make user-install
    - name: Testing r2ghidra oneliner on home setup
      run: R2_DEBUG=1 r2 -qc 'af;pdg' /bin/ls | tee a.txt && grep entry0 a.txt
    - name: System-wide installation
      run: make user-uninstall && sudo make install
    - name: Testing r2ghidra oneliner on system wide install
      run: R2_DEBUG=1 r2 -qc 'af;pdg' /bin/ls | tee a.txt && grep entry0 a.txt
    - name: Packaging r2ghidra for Debian
      run: make -C dist/debian
#    - name: Running Testsuite
#      run: make -C test

  linux-deb:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
    steps:
    - name: Checkout
      uses: actions/checkout@v7
    - name: Installing radare2 from deb
      run: |
        wget https://github.com/radareorg/radare2/releases/download/${{env.R2V}}/radare2_${{env.R2V}}_amd64.deb
        wget https://github.com/radareorg/radare2/releases/download/${{env.R2V}}/radare2-dev_${{env.R2V}}_amd64.deb
        sudo dpkg -i *.deb
    - name: Building r2ghidra with acr
      run: ./preconfigure && ./configure --prefix=/usr && make -j4 ; make user-install
    - name: Testing r2ghidra oneliner on home setup
      run: R2_DEBUG=1 r2 -qc 'af;pdg' /bin/ls | tee a.txt && grep entry0 a.txt
    - name: System-wide installation
      run: make user-uninstall && sudo make install
    - name: Testing r2ghidra oneliner on system wide install
      run: R2_DEBUG=1 r2 -qc 'af;pdg' /bin/ls | tee a.txt && grep entry0 a.txt
    - name: Packaging r2ghidra for Debian using Dockcross
      run: make -C dist/debian
    - name: Uploading debs
      uses: actions/upload-artifact@v7
      with:
        # path: radare2/dist/debian/*/*.deb r2ghidra/dist/debian/*.deb
        name: linux-deb
        path: dist/debian/*.deb
    - name: Precompiling the sleigh
      run: make dist
    - name: Uploading sleigh
      uses: actions/upload-artifact@v7
      with:
        name: linux-acr-ok
        path: r2ghidra_sleigh-*.zip

  tarball:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v7
    - name: Large >99KB files in test/bins are not allowed
      run: \[ "$(find test/bins -type f -size +99123c | wc -l)" -eq 0 \]
    - name: Installing radare2 from deb
      run: |
        wget https://github.com/radareorg/radare2/releases/download/${{env.R2V}}/radare2_${{env.R2V}}_amd64.deb
        wget https://github.com/radareorg/radare2/releases/download/${{env.R2V}}/radare2-dev_${{env.R2V}}_amd64.deb
        sudo dpkg -i *.deb
        rm *.deb
    - name: Building tars
      run: make -C dist/tarball
    - name: Uploading balls
      uses: actions/upload-artifact@v7
      with:
        name: tarball
        path: dist/tarball/r2ghidra-*

  linux-asan:
    if: ${{ false }}  # disable for now
    # The type of runner that the job will run on
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false

    # Steps represent a sequence of tasks that will be executed as part of your job
    steps:
    - name: Checkout
      uses: actions/checkout@v7
    - name: Installing radare2
    #  run: ( git clone --depth=1 --branch "${R2V}" https://github.com/radareorg/radare2 && cd radare2 && sys/sanitize.sh --install /usr )
      run: ( git clone --depth=1 --branch "${R2V}" https://github.com/radareorg/radare2 && cd radare2 && sys/install.sh --install )
    - name: Building r2ghidra with acr
      run: ./preconfigure && ./configure && make asan && make -C src sleigh-build && make user-install
    - name: Testing r2ghidra oneliner
      run: |
        r2 -qc 'af;pdg' /bin/ls | tee a.txt
        grep entry0 a.txt

  linux-meson:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
    steps:
    - name: Checkout
      uses: actions/checkout@v7
    - name: Downloading Radare2 Debian packages
      run: |
        wget -O r2.deb     https://github.com/radareorg/radare2/releases/download/${{env.R2V}}/radare2_${{env.R2V}}_amd64.deb
        wget -O r2-dev.deb https://github.com/radareorg/radare2/releases/download/${{env.R2V}}/radare2-dev_${{env.R2V}}_amd64.deb
    - name: Installing Radare2
      run: sudo dpkg -i r2.deb r2-dev.deb
    - name: Installing User's Meson Ninja
      run: pip install ninja meson && ninja --version && meson --version
    - name: Installing System's Meson Ninja
      run: sudo pip install ninja meson && sudo ninja --version && sudo meson --version
    - name: Building r2ghidra with meson
      run: ./preconfigure && meson b && ninja -C b && sudo ninja -C b install
    - name: Cannot test meson builds, because those cant be installed yet
      run: echo nada
#    - name: Testing r2ghidra oneliner
#      run: |
#        r2 -H
#        r2 -L
#        R2_DEBUG=1 r2 -qc 'af;pdg' /bin/ls | tee a.txt
#        grep entry0 a.txt

  macos-pkg:
    # The type of runner that the job will run on
    runs-on: macos-latest
    # Build for both architectures
    strategy:
      matrix:
        arch: [x86_64, arm64]
    env:
      ARCH: ${{ matrix.arch }}

    # Steps represent a sequence of tasks that will be executed as part of your job
    steps:
    - name: Checkout
      uses: actions/checkout@v7
    - name: Cloning radare2
      run: git clone --depth=1 --branch "${R2V}" https://github.com/radareorg/radare2
    - name: Building Radare2 pkg for macOS
      run: |
        echo "Building radare2 for architecture: $ARCH"
        make -C radare2/dist/macos ARCH=$ARCH
    - name: Install radare2 Package
      run: sudo installer -pkg radare2/dist/macos/*.pkg -target /
    - name: Building r2ghidra with acr
      run: |
        ./preconfigure
        ./configure
        make -j4
        make user-install
    - name: Packaging r2ghidra
      run: |
        make -C dist/macos ARCH=$ARCH
        make install DESTDIR=/tmp/r2ghidra
        cd /tmp/r2ghidra
        tar czvf ../r2ghidra-macos-${ARCH}.tar.gz *
    - name: Testing r2ghidra
      run: |
        r2 -qc 'af;pdg' test/bins/rec | tee a.txt
        grep csu_init a.txt
    - name: Uploading artifacts
      uses: actions/upload-artifact@v7
      with:
        name: macos-pkg-${{ env.ARCH }}
        path: dist/macos/r2ghidra-${{ env.R2V }}-macos-${{ env.ARCH }}.zip

  r2ghidra-linux-arm64:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Install ARM64 cross-compilation toolchain
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu pkg-config
        echo "=== ARM64 Toolchain Installed ==="
        aarch64-linux-gnu-gcc --version
        aarch64-linux-gnu-g++ --version
        aarch64-linux-gnu-ar --version

    - name: Download and cross-compile Radare2 for ARM64
      run: |
        git clone --depth=1 --branch "${R2V}" https://github.com/radareorg/radare2
        cd radare2
        echo "=== Cross-compiling Radare2 for ARM64 ==="
        export CC=aarch64-linux-gnu-gcc
        export CXX=aarch64-linux-gnu-g++
        export AR=aarch64-linux-gnu-ar
        export LD=aarch64-linux-gnu-ld
        export CFLAGS="-O2 -march=armv8-a"
        export CXXFLAGS="-O2 -march=armv8-a"
        export LDFLAGS="-L/tmp/r2-arm64-install/lib"
        ./configure --prefix=/tmp/r2-arm64-install --host=aarch64-linux-gnu --enable-shared
        make -j4
        make install
        cd ..
        echo "=== Radare2 ARM64 build completed ==="
        ls -lh /tmp/r2-arm64-install/lib/libr_*.so* 2>/dev/null | head -5

    - name: Cross-compile r2ghidra for ARM64
      run: |
        echo "=== Cross-compiling r2ghidra for ARM64 ==="
        export CC=aarch64-linux-gnu-gcc
        export CXX=aarch64-linux-gnu-g++
        export AR=aarch64-linux-gnu-ar
        export LD=aarch64-linux-gnu-ld
        export CFLAGS="-O2 -march=armv8-a"
        export CXXFLAGS="-O2 -march=armv8-a"
        export LDFLAGS="-L/tmp/r2-arm64-install/lib"
        export PKG_CONFIG_PATH=/tmp/r2-arm64-install/lib/pkgconfig
        export LD_LIBRARY_PATH=/tmp/r2-arm64-install/lib:$LD_LIBRARY_PATH
        export PATH=$PATH:/tmp/r2-arm64-install/bin
        ./preconfigure
        ./configure --prefix=/tmp/r2ghidra-arm64-install --host=aarch64-linux-gnu --with-radare2=/tmp/r2-arm64-install
        make -j4
        make install
        echo "=== r2ghidra ARM64 build completed ==="

    - name: Creating distribution artifact structure
      run: |
        set -e
        DIST_DIR="artifacts/r2ghidra-linux-arm64-full"
        mkdir -p "${DIST_DIR}/headers"
        mkdir -p "${DIST_DIR}/plugins"
        mkdir -p "${DIST_DIR}/objects"
        mkdir -p "${DIST_DIR}/sleigh"
        mkdir -p "${DIST_DIR}/libs"

        echo "=== Collecting Headers ==="
        # Copy headers with original directory structure
        if [ -d "src" ]; then
          mkdir -p "${DIST_DIR}/headers/src"
          find src -name "*.h" -type f 2>/dev/null | while read hdr; do
            cp --parents "$hdr" "${DIST_DIR}/headers/" 2>/dev/null || true
          done
        fi
        if [ -d "ghidra" ]; then
          cp -r ghidra "${DIST_DIR}/headers/" 2>/dev/null || true
        fi
        if [ -d "subprojects" ]; then
          cp -r subprojects "${DIST_DIR}/headers/" 2>/dev/null || true
        fi

        echo "=== Collecting Plugins (.so files) ==="
        # Copy compiled .so plugin files from installation
        find /tmp/r2ghidra-arm64-install -name "*.so*" -type f 2>/dev/null | while read plugin; do
          cp "$plugin" "${DIST_DIR}/plugins/" 2>/dev/null || true
          echo "Copied: $(basename $plugin)"
        done

        echo "=== Collecting Radare2 Libraries ==="
        # Copy radare2 libraries
        find /tmp/r2-arm64-install/lib -name "libr_*.so*" -type f 2>/dev/null | while read lib; do
          cp "$lib" "${DIST_DIR}/libs/" 2>/dev/null || true
          echo "Copied: $(basename $lib)"
        done

        echo "=== Collecting Object Files (.o) ==="
        # Copy all compiled .o object files
        find . -name "*.o" -type f 2>/dev/null | while read obj_file; do
          rel_path=$(echo "$obj_file" | sed 's|^\./||')
          dir_path=$(dirname "$rel_path")
          mkdir -p "${DIST_DIR}/objects/${dir_path}"
          cp "$obj_file" "${DIST_DIR}/objects/${rel_path}"
        done

        echo "=== Collecting Sleigh Archives ==="
        # Copy Sleigh ZIP archive if it exists
        find . -name "r2ghidra_sleigh-*.zip" -type f 2>/dev/null | while read sleigh; do
          cp "$sleigh" "${DIST_DIR}/sleigh/"
          echo "Copied: $(basename $sleigh)"
        done

        echo "=== Creating MANIFEST.txt ==="
        # Create comprehensive MANIFEST.txt with build metadata
        cat > "${DIST_DIR}/MANIFEST.txt" << 'EOF'
r2ghidra Linux ARM64 Cross-Compiled Distribution
===============================================

Build Information:
  Build Date: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
  Architecture: ARM64 (aarch64) - CROSS-COMPILED
  Build System: GNU ACR + Make with ARM64 cross-toolchain
  Radare2 Version: 6.1.8
  Target: Linux ARM64 (aarch64-linux-gnu)
  Build Host: Ubuntu 22.04 x86_64
  Build Method: Cross-compilation using aarch64 target triplet

Cross-Compilation Toolchain:
  Primary Compiler: gcc-aarch64-linux-gnu / g++-aarch64-linux-gnu
  Binutils: binutils-aarch64-linux-gnu
  
  Environment Variables Set:
    CC: aarch64-linux-gnu-gcc
    CXX: aarch64-linux-gnu-g++
    AR: aarch64-linux-gnu-ar
    LD: aarch64-linux-gnu-ld
    CFLAGS: -O2 -march=armv8-a
    CXXFLAGS: -O2 -march=armv8-a

  Configure Flags:
    Radare2: --prefix=/tmp/r2-arm64-install --host=aarch64-linux-gnu --enable-shared
    r2ghidra: --prefix=/tmp/r2ghidra-arm64-install --host=aarch64-linux-gnu

Artifact Structure:
  headers/     - All .h header files with original directory structure
                 ├── src/         (Core r2ghidra headers)
                 ├── ghidra/      (Sleigh/Ghidra headers)
                 └── subprojects/ (Third-party headers: pugixml, etc.)

  plugins/     - Cross-compiled r2ghidra plugin files (.so)
                 └── All r2ghidra plugin shared objects

  libs/        - Radare2 ARM64 libraries (.so files)
                 ├── libr_asm.so
                 ├── libr_core.so
                 ├── libr_anal.so
                 └── ... (other radare2 libraries)

  objects/     - Cross-compiled object files (.o)
                 ├── src/         (Core r2ghidra objects)
                 ├── ghidra/      (Ghidra/Decompiler objects)
                 └── subprojects/ (Third-party compiled objects: pugixml.o, etc.)

  sleigh/      - Precompiled Sleigh architecture definitions
                 └── r2ghidra_sleigh-*.zip

Installation Instructions:
  For ARM64 Linux Systems (Raspberry Pi, NVIDIA Jetson, etc.):
  
  1. Extract the archive on target ARM64 system:
     tar xzf r2ghidra-linux-arm64-full.tar.gz
     
  2. Install libraries:
     sudo cp libs/* /usr/local/lib/
     sudo ldconfig
     
  3. Install plugins:
     sudo cp plugins/* /usr/lib/radare2/plugins/
     
  4. Install headers (optional, for development):
     sudo cp -r headers/* /usr/include/
     
  5. Verify installation:
     r2 -L | grep ghidra
     r2 -H | grep Ghidra

Compatibility:
  Target: ARM64 (aarch64) 64-bit Linux systems
  Tested on: Debian/Ubuntu based ARM64 systems
  Compatible Devices: 
    - Raspberry Pi 4/5 (with 64-bit OS)
    - NVIDIA Jetson Xavier/Orin
    - AWS Graviton instances
    - Other ARM64 Linux systems

Build Features:
  ✓ Cross-compiled from x86_64 host
  ✓ Optimized for ARMv8-A architecture
  ✓ Full object files for static linking
  ✓ Complete header hierarchy for development
  ✓ Precompiled Sleigh processor definitions
  ✓ Ready for immediate deployment

Build Artifacts Generated:
  - r2ghidra-linux-arm64-full.tar.gz  (Full distribution archive)
  - r2ghidra-linux-arm64-full.zip     (Alternate archive format)
  - r2ghidra-linux-arm64-full.sha256  (Checksums for verification)
  - Separate artifact uploads for plugins, headers, objects, and sleigh

Builder: GitHub Actions (ubuntu-22.04 with ARM64 cross-toolchain)
Repository: KaliRootSuperUser/r2ghidra
EOF

        echo "Distribution structure created successfully"
        ls -lah "${DIST_DIR}/"
        echo ""
        echo "=== Artifact Contents Summary ==="
        echo "Headers: $(find ${DIST_DIR}/headers -type f | wc -l) files"
        echo "Plugins: $(find ${DIST_DIR}/plugins -type f | wc -l) files"
        echo "Libraries: $(find ${DIST_DIR}/libs -type f | wc -l) files"
        echo "Objects: $(find ${DIST_DIR}/objects -type f | wc -l) files"
        echo "Sleigh: $(find ${DIST_DIR}/sleigh -type f | wc -l) files"

    - name: Creating final compressed archives
      run: |
        cd artifacts
        echo "Creating tar.gz archive..."
        tar -czf r2ghidra-linux-arm64-full.tar.gz r2ghidra-linux-arm64-full/
        echo "Creating zip archive..."
        zip -r r2ghidra-linux-arm64-full.zip r2ghidra-linux-arm64-full/ -q
        echo ""
        echo "=== Archive Information ==="
        ls -lh r2ghidra-linux-arm64-full.*
        cd ..

    - name: Generate checksums
      run: |
        cd artifacts
        echo "=== Generating SHA256 Checksums ==="
        sha256sum r2ghidra-linux-arm64-full.tar.gz > r2ghidra-linux-arm64-full.sha256
        sha256sum r2ghidra-linux-arm64-full.zip >> r2ghidra-linux-arm64-full.sha256
        echo ""
        cat r2ghidra-linux-arm64-full.sha256
        cd ..

    - name: Uploading ARM64 full distribution (tar.gz)
      uses: actions/upload-artifact@v7
      with:
        name: linux-arm64-full
        path: artifacts/r2ghidra-linux-arm64-full.tar.gz
        retention-days: 30

    - name: Uploading ARM64 full distribution (zip)
      uses: actions/upload-artifact@v7
      with:
        name: linux-arm64-full-zip
        path: artifacts/r2ghidra-linux-arm64-full.zip
        retention-days: 30

    - name: Uploading ARM64 checksums
      uses: actions/upload-artifact@v7
      with:
        name: linux-arm64-checksums
        path: artifacts/r2ghidra-linux-arm64-full.sha256
        retention-days: 30

    - name: Uploading ARM64 plugins
      uses: actions/upload-artifact@v7
      with:
        name: linux-arm64-plugins
        path: artifacts/r2ghidra-linux-arm64-full/plugins/
        retention-days: 30

    - name: Uploading ARM64 headers
      uses: actions/upload-artifact@v7
      with:
        name: linux-arm64-headers
        path: artifacts/r2ghidra-linux-arm64-full/headers/
        retention-days: 30

    - name: Uploading ARM64 objects
      uses: actions/upload-artifact@v7
      with:
        name: linux-arm64-objects
        path: artifacts/r2ghidra-linux-arm64-full/objects/
        retention-days: 30

    - name: Uploading ARM64 libraries
      uses: actions/upload-artifact@v7
      with:
        name: linux-arm64-libraries
        path: artifacts/r2ghidra-linux-arm64-full/libs/
        retention-days: 30

    - name: Uploading ARM64 sleigh
      uses: actions/upload-artifact@v7
      with:
        name: linux-arm64-sleigh
        path: artifacts/r2ghidra-linux-arm64-full/sleigh/
        retention-days: 30

  w64:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-python@v6
      with:
        python-version: 3.12.x
    - name: Preparing msvc toolchain
      uses: TheMrMilchmann/setup-msvc-dev@v4
      with:
        arch: x64
    - name: dependencies
      shell: bash
      run: |
        pip install ninja meson wget
    - name: install r2
      shell: bash
      run: |
        python -m wget https://github.com/radareorg/radare2/releases/download/${{env.R2V}}/radare2-${{env.R2V}}-w64.zip -o r2.zip
        python3 -m zipfile -e r2.zip .
        mv radare2-${{env.R2V}}-w64 radare2
        pwd
    - name: batmake
      shell: cmd
      run: |
        call preconfigure.bat
        call configure.bat
        call make.bat
    - name: Rename artifact with version
      shell: bash
      run: mv destdir/r2ghidra-w64.zip destdir/r2ghidra-${{env.R2V}}-w64.zip
    - uses: actions/upload-artifact@v7
      with:
        name: w64
        path: destdir/r2ghidra-${{env.R2V}}-w64.zip

  check_release:
    # Run on tag pushes; filter tags starting with a digit in the release step
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
    outputs:
      is_release: ${{ steps.release.outputs.is }}
      tag_name: ${{ steps.release.outputs.tag }}
    needs:
      - linux-deb
      - macos-pkg
      - tarball
      - w64
      - r2ghidra-linux-arm64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Download all git history and tags
      - name: Check if is a release
        run: git describe --exact-match --tags ${{ github.sha }} | awk 'BEGIN{tag="-";r="no"}/^[0-9]+\.[0-9]+/{tag=$0;r="yes"};END{print "is="r;print "tag="tag}' >> ${GITHUB_OUTPUT}
        id: release
  release:
    # Only create a release for numeric tags that passed check_release
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && needs.check_release.outputs.is_release == 'yes' }}
    needs:
      - check_release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Download all git history and tags
      - name: Extract r2g version
        run: echo "branch=`./configure -qV`" >> $GITHUB_OUTPUT
        id: r2gv
      - name: Prepare release notes
        run: echo Release > ./RELEASE_NOTES.md
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/artifacts
      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.check_release.outputs.tag_name }}
          name: ${{ steps.r2gv.outputs.branch }}
          body_path: ./RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            dist/artifacts/linux-deb/r2ghidra_${{ steps.r2gv.outputs.branch }}_amd64.deb
            dist/artifacts/macos-pkg-x86_64/r2ghidra-${{ steps.r2gv.outputs.branch }}-macos-x86_64.zip
            dist/artifacts/macos-pkg-arm64/r2ghidra-${{ steps.r2gv.outputs.branch }}-macos-arm64.zip
            dist/artifacts/w64/r2ghidra-${{ steps.r2gv.outputs.branch }}-w64.zip
            dist/artifacts/tarball/r2ghidra-${{ steps.r2gv.outputs.branch }}.zip
            dist/artifacts/tarball/r2ghidra-${{ steps.r2gv.outputs.branch }}.tar.xz
            dist/artifacts/linux-acr-ok/r2ghidra_sleigh-${{ steps.r2gv.outputs.branch }}.zip
            dist/artifacts/linux-arm64-full/r2ghidra-linux-arm64-full.tar.gz
            dist/artifacts/linux-arm64-full-zip/r2ghidra-linux-arm64-full.zip
            dist/artifacts/linux-arm64-checksums/r2ghidra-linux-arm64-full.sha256
            dist/artifacts/linux-arm64-sleigh/r2ghidra_sleigh-*.zip
